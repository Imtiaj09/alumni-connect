<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গ্যালারি</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: memberNav('gallery', 'মেম্বার')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Gallery</h2>
    <p class="mt-1">স্কুল ও ব্যাচের গ্যালারি দেখুন, প্রয়োজন হলে নতুন ছবি আপলোড করুন।</p>
</div>
    <p class="text-success" th:if="${message}" th:text="${message}"></p>
    <section class="section-card mb-3">
        <div class="section-head"><h4>Upload</h4></div>
        <div class="section-body">
            <form th:action="@{/member/gallery/upload}" method="post" enctype="multipart/form-data" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="row g-2">
                    <div class="col-md-5">
                        <input type="file" name="imageFile" accept="image/*" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" name="caption" class="form-control" placeholder="ক্যাপশন (ঐচ্ছিক)">
                    </div>
                    <div class="col-md-2">
                        <select name="scope" class="form-select">
                            <option value="BATCH">ব্যাচ গ্যালারি</option>
                            <option value="SCHOOL">স্কুল গ্যালারি</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">আপলোড</button>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <section class="section-card mb-3">
        <div class="section-head"><h4>স্কুল গ্যালারি</h4></div>
        <div class="section-body">
            <div class="row g-3 mb-1">
                <div class="col-md-4" th:each="item : ${schoolItems}">
                    <div class="card h-100">
                        <img th:src="${item.url}" class="card-img-top" alt="gallery item">
                        <div class="card-body">
                            <p class="card-text" th:text="${item.caption}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="section-card">
        <div class="section-head"><h4>ব্যাচ গ্যালারি</h4></div>
        <div class="section-body">
            <div class="row g-3">
                <div class="col-md-4" th:each="item : ${batchItems}">
                    <div class="card h-100">
                        <img th:src="${item.url}" class="card-img-top" alt="gallery item">
                        <div class="card-body">
                            <p class="card-text" th:text="${item.caption}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
