<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চ্যাট</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: memberNav('messages', 'মেম্বার')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Chat</h2>
    <p class="mt-1" th:text="'Conversation with ' + ${otherUser.fullName}"></p>
</div>
<div class="chat-shell">
    <a th:href="@{/member/messages}" class="btn btn-outline-secondary btn-sm mb-2">ইনবক্সে ফিরে যান</a>
    <section class="section-card">
        <div class="section-head">
            <h4 th:text="${otherUser.fullName}"></h4>
        </div>
        <div class="section-body chat-scroll">
            <div th:if="${messages.isEmpty()}" class="text-muted">কোনো মেসেজ নেই।</div>
            <div th:each="msg : ${messages}" class="chat-row">
                <div th:if="${msg.sender.id == currentUser.id}" class="text-end">
                    <span class="chat-bubble chat-bubble-self" th:text="${msg.content}"></span>
                </div>
                <div th:unless="${msg.sender.id == currentUser.id}" class="text-start">
                    <span class="chat-bubble chat-bubble-other" th:text="${msg.content}"></span>
                </div>
                <small class="text-muted" th:text="${#temporals.format(msg.sentAt, 'HH:mm')}"></small>
            </div>
        </div>
        <div class="section-body border-top">
            <p class="text-danger mb-2" th:if="${error}" th:text="${error}"></p>
            <form th:action="@{/member/messages/chat/{id}(id=${otherUser.id})}" method="post" class="d-flex chat-input">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="text" name="content" class="form-control me-2" placeholder="মেসেজ লিখুন..." required>
                <button class="btn btn-primary">পাঠান</button>
            </form>
        </div>
    </section>
</div>
    </main>
</div>
<script>
    (function () {
        var box = document.querySelector(".chat-scroll");
        if (box) {
            box.scrollTop = box.scrollHeight;
        }
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
