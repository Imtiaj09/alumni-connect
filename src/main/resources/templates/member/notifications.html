<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নোটিফিকেশন</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: memberNav('notifications', 'মেম্বার')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Notifications</h2>
    <p class="mt-1">আপনার অ্যাকাউন্ট ও ব্যাচ-সংক্রান্ত সাম্প্রতিক আপডেট।</p>
</div>
<section class="section-card">
    <div class="section-head">
        <h4>All Notifications</h4>
        <div class="d-flex align-items-center gap-2">
            <span class="chip chip-warn">Unread: <strong th:text="${unreadCount}" class="ms-1"></strong></span>
            <form th:action="@{/member/notifications/read-all}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-secondary btn-sm">সবগুলো Read</button>
            </form>
        </div>
    </div>
    <div class="section-body p-0">
        <ul class="list-group">
            <li class="list-group-item" th:if="${notifications.isEmpty()}">কোনো নোটিফিকেশন নেই।</li>
            <li class="list-group-item" th:each="n : ${notifications}">
                <div class="d-flex justify-content-between">
                    <span th:text="${n.message}"></span>
                    <span class="badge" th:classappend="${n.read ? 'text-bg-secondary' : 'text-bg-primary'}"
                          th:text="${n.read ? 'Read' : 'Unread'}"></span>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-1">
                    <small class="text-muted" th:text="${#temporals.format(n.createdAt, 'dd-MM-yyyy HH:mm')}"></small>
                    <form th:if="${!n.read}" th:action="@{/member/notifications/read/{id}(id=${n.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-link btn-sm p-0">পড়া হয়েছে</button>
                    </form>
                </div>
            </li>
        </ul>
    </div>
</section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
