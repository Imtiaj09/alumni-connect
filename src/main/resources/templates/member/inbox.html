<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইনবক্স | আলামনাই সংযোগ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: memberNav('messages', 'মেম্বার')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Inbox</h2>
    <p class="mt-1">ব্যাচমেটদের সাথে আপনার সব কনভারসেশনের সাম্প্রতিক তালিকা।</p>
</div>
<section class="section-card">
    <div class="section-head">
        <h4>Conversations</h4>
        <span class="chip chip-warn">Unread: <strong th:text="${unreadCount}" class="ms-1"></strong></span>
    </div>
    <div class="section-body p-0">
    <div class="list-group mt-0">
        <div th:if="${inbox.isEmpty()}" class="list-group-item">কোনো মেসেজ নেই।</div>
        <a th:each="msg : ${inbox}"
           th:href="@{/member/messages/chat/{id}(id=${msg.sender.id != currentUser.id ? msg.sender.id : msg.receiver.id})}"
           class="list-group-item list-group-item-action">
            <div class="d-flex justify-content-between">
                <h6 class="mb-1"
                    th:text="${msg.sender.id != currentUser.id ? msg.sender.fullName : msg.receiver.fullName}"></h6>
                <small th:text="${#temporals.format(msg.sentAt, 'dd MMM, HH:mm')}"></small>
            </div>
            <p class="mb-0 text-truncate" th:text="${msg.content}"></p>
        </a>
    </div>
    </div>
</section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
