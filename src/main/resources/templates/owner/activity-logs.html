<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাক্টিভিটি লগ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: ownerNav('logs')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Activity Logs</h2>
    <p class="mt-1">প্ল্যাটফর্মে সম্পন্ন সকল গুরুত্বপূর্ণ কাজের অডিট ট্রেইল।</p>
</div>
<section class="section-card">
    <div class="section-head">
        <h4>Recent Activities</h4>
    </div>
    <div class="section-body p-0">
        <div class="table-responsive">
            <table class="table table-striped mb-0">
                <thead>
                <tr>
                    <th>সময়</th>
                    <th>কাজ</th>
                    <th>এনটিটি</th>
                    <th>বিবরণ</th>
                    <th>ইউজার</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${logs}">
                    <td th:text="${#temporals.format(log.timestamp, 'dd-MM-yyyy HH:mm')}"></td>
                    <td><span class="chip chip-ok" th:text="${log.action}"></span></td>
                    <td th:text="${log.entityType + ' #' + log.entityId}"></td>
                    <td th:text="${log.description}"></td>
                    <td th:text="${log.performedBy != null ? log.performedBy.fullName : 'System'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
