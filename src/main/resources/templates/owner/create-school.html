<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন স্কুল তৈরি</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: ownerNav('create-school')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>New School Onboarding</h2>
    <p class="mt-1">স্কুল ও প্রাথমিক অ্যাডমিন অ্যাকাউন্ট একটি ফর্ম থেকেই তৈরি করুন।</p>
</div>
<p class="text-danger" th:if="${error}" th:text="${error}"></p>
<section class="section-card">
    <div class="section-head">
        <h4>School Information</h4>
    </div>
    <div class="section-body">
        <form th:action="@{/owner/school/create}" method="post" enctype="multipart/form-data" th:object="${form}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">স্কুলের নাম</label>
                <input type="text" class="form-control" th:field="*{schoolName}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">ঠিকানা</label>
                <input type="text" class="form-control" th:field="*{address}" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">শহর</label>
                <input type="text" class="form-control" th:field="*{city}">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">দেশ</label>
                <input type="text" class="form-control" th:field="*{country}">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">ফোন</label>
                <input type="text" class="form-control" th:field="*{phone}">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">ইমেইল</label>
                <input type="email" class="form-control" th:field="*{email}">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">স্কুলের লোগো (ঐচ্ছিক)</label>
                <input type="file" class="form-control" th:field="*{logoFile}" accept=".png,.jpg,.jpeg,.gif,.webp">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">পার্টনারশিপ ডকুমেন্ট (ঐচ্ছিক)</label>
                <input type="file" class="form-control" th:field="*{documentFile}" accept=".pdf,.doc,.docx">
            </div>
        </div>
        <hr>
        <h4>স্কুল অ্যাডমিন অ্যাকাউন্ট</h4>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">অ্যাডমিনের নাম</label>
                <input type="text" class="form-control" th:field="*{adminName}" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">অ্যাডমিন ইমেইল</label>
                <input type="email" class="form-control" th:field="*{adminEmail}" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">পাসওয়ার্ড</label>
                <input type="password" class="form-control" th:field="*{adminPassword}" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">স্কুল তৈরি করুন</button>
        </form>
    </div>
</section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
