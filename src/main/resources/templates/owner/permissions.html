<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্ল্যাটফর্ম পারমিশন</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: ownerNav('permissions')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Platform Permissions</h2>
    <p class="mt-1">গ্লোবাল ফিচার টগলস আপডেট করে পুরো প্ল্যাটফর্মের আচরণ নিয়ন্ত্রণ করুন।</p>
</div>
<p class="text-success" th:if="${message}" th:text="${message}"></p>
<section class="section-card">
    <div class="section-head">
        <h4>Feature Toggles</h4>
    </div>
    <div class="section-body">
    <form th:action="@{/owner/permissions/update}" method="post" th:object="${settings}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" th:field="*{messagingEnabled}" id="messagingEnabled">
            <label class="form-check-label" for="messagingEnabled">মেসেজিং</label>
        </div>
        <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" th:field="*{galleryEnabled}" id="galleryEnabled">
            <label class="form-check-label" for="galleryEnabled">গ্যালারি</label>
        </div>
        <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" th:field="*{donationEnabled}" id="donationEnabled">
            <label class="form-check-label" for="donationEnabled">অনুদান</label>
        </div>
        <button type="submit" class="btn btn-primary">সংরক্ষণ</button>
    </form>
    </div>
</section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
