<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্কুল অ্যানালিটিক্স</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('analytics')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>School Analytics</h2>
    <p class="mt-1">সদস্য, ব্যাচ, পোস্ট ও ক্যাম্পেইনের অপারেশনাল মেট্রিকস এক নজরে।</p>
</div>
<div class="kpi-grid">
    <div class="kpi-card kpi-card--indigo">
        <div class="kpi-label">মোট সদস্য</div>
        <div class="kpi-value" th:text="${totalMembers}"></div>
    </div>
    <div class="kpi-card kpi-card--gold">
        <div class="kpi-label">পেন্ডিং সদস্য</div>
        <div class="kpi-value" th:text="${pendingMembers}"></div>
    </div>
    <div class="kpi-card kpi-card--teal">
        <div class="kpi-label">মোট ব্যাচ</div>
        <div class="kpi-value" th:text="${totalBatches}"></div>
    </div>
    <div class="kpi-card kpi-card--red">
        <div class="kpi-label">সক্রিয় ক্যাম্পেইন</div>
        <div class="kpi-value" th:text="${activeFunds}"></div>
    </div>
    <div class="kpi-card kpi-card--indigo">
        <div class="kpi-label">পেন্ডিং পোস্ট</div>
        <div class="kpi-value" th:text="${pendingPosts}"></div>
    </div>
</div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
