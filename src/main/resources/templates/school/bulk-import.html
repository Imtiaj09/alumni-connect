<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাল্ক ইম্পোর্ট</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('bulk-import')}"></th:block>
<main class="app-main">
<div class="container-fluid py-2">
    <h2 class="mb-3">অ্যালামনাই বাল্ক ইম্পোর্ট</h2>
    <p class="text-success" th:if="${message}" th:text="${message}"></p>
    <p class="text-danger" th:if="${error}" th:text="${error}"></p>
    <form th:action="@{/school/bulk-import}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3"><label class="form-label">CSV ফাইল</label><input type="file" name="file" accept=".csv" class="form-control" required></div>
        <div class="mb-3">
            <label class="form-label">ব্যাচ</label>
            <select name="batchId" class="form-select" required>
                <option value="">ব্যাচ নির্বাচন করুন</option>
                <option th:each="b : ${batches}" th:value="${b.id}" th:text="${b.name}"></option>
            </select>
        </div>
        <button class="btn btn-success">ইম্পোর্ট করুন</button>
    </form>
</div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
