<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন ক্যাম্পেইন</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('funds')}"></th:block>
<main class="app-main">
<div class="container-fluid py-2">
    <h2>নতুন তহবিল ক্যাম্পেইন</h2>
    <form th:action="@{/school/fund-campaign/create}" method="post" th:object="${campaign}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label class="form-label">শিরোনাম</label>
            <input type="text" class="form-control" th:field="*{title}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">বিস্তারিত</label>
            <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">লক্ষ্য পরিমাণ</label>
                <input type="number" min="1" step="0.01" class="form-control" th:field="*{targetAmount}" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">শেষ তারিখ</label>
                <input type="date" class="form-control" th:field="*{deadline}">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">ব্যাচ (ঐচ্ছিক)</label>
                <select class="form-select" name="batchId">
                    <option value="">স্কুল-ব্যাপী</option>
                    <option th:each="batch : ${batches}" th:value="${batch.id}" th:text="${batch.name}"></option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">তৈরি করুন</button>
    </form>
</div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
