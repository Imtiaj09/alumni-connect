<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্কুল প্রোফাইল সম্পাদনা</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('profile')}"></th:block>
<main class="app-main">
<div class="container-fluid py-2">
    <h2 class="mb-4">স্কুল প্রোফাইল সম্পাদনা</h2>
    <form th:action="@{/school/profile}" method="post" enctype="multipart/form-data" th:object="${school}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3"><label class="form-label">স্কুলের নাম</label><input type="text" th:field="*{name}" class="form-control"></div>
        <div class="mb-3">
            <label class="form-label">বর্তমান লোগো</label>
            <div>
                <img th:if="${school.logoUrl != null and !#strings.isEmpty(school.logoUrl)}"
                     th:src="${school.logoUrl}"
                     alt="School Logo"
                     style="width:72px;height:72px;object-fit:cover;border-radius:10px;border:1px solid #d1d5db;">
                <span th:if="${school.logoUrl == null or #strings.isEmpty(school.logoUrl)}" class="text-muted">কোনো লোগো সেট করা নেই</span>
            </div>
        </div>
        <div class="mb-3"><label class="form-label">নতুন লোগো আপলোড</label><input type="file" name="logoFile" accept=".png,.jpg,.jpeg,.webp,.gif" class="form-control"></div>
        <div class="mb-3"><label class="form-label">ঠিকানা</label><input type="text" th:field="*{address}" class="form-control"></div>
        <div class="row">
            <div class="col-md-4 mb-3"><label class="form-label">ফোন</label><input type="text" th:field="*{phone}" class="form-control"></div>
            <div class="col-md-4 mb-3"><label class="form-label">ইমেইল</label><input type="email" th:field="*{email}" class="form-control"></div>
            <div class="col-md-4 mb-3"><label class="form-label">ওয়েবসাইট</label><input type="text" th:field="*{website}" class="form-control"></div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label">প্রাইমারি রং</label><input type="color" th:field="*{primaryColor}" class="form-control form-control-color"></div>
            <div class="col-md-6 mb-3"><label class="form-label">সেকেন্ডারি রং</label><input type="color" th:field="*{secondaryColor}" class="form-control form-control-color"></div>
        </div>
        <button class="btn btn-primary mt-2">সংরক্ষণ</button>
    </form>
</div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
