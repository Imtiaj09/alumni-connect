<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সকল সদস্য | স্কুল অ্যাডমিন</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('members')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>School Members</h2>
    <p class="mt-1">সদস্য, CR, ভেরিফিকেশন, সাসপেনশন এবং ডিলিট অপারেশন একসাথে ম্যানেজ করুন।</p>
</div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <section class="section-card mb-3">
        <div class="section-head">
            <h4>Filters</h4>
        </div>
        <div class="section-body">
            <form method="get" th:action="@{/school/members}" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label mb-1">Search</label>
                    <input type="text" class="form-control" name="q" th:value="${q}" placeholder="নাম / ইমেইল / ব্যাচ">
                </div>
                <div class="col-md-2">
                    <label class="form-label mb-1">Role</label>
                    <select class="form-select" name="role">
                        <option value="ALL" th:selected="${role == 'ALL'}">সব</option>
                        <option value="MEMBER" th:selected="${role == 'MEMBER'}">Member</option>
                        <option value="BATCH_CONTROLLER" th:selected="${role == 'BATCH_CONTROLLER'}">Batch Controller</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label mb-1">Status</label>
                    <select class="form-select" name="status">
                        <option value="ALL" th:selected="${status == 'ALL'}">সব</option>
                        <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">Active</option>
                        <option value="SUSPENDED" th:selected="${status == 'SUSPENDED'}">Suspended</option>
                        <option value="UNVERIFIED" th:selected="${status == 'UNVERIFIED'}">Unverified</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label mb-1">Page size</label>
                    <select class="form-select" name="size">
                        <option value="10" th:selected="${size == 10}">10</option>
                        <option value="20" th:selected="${size == 20}">20</option>
                        <option value="30" th:selected="${size == 30}">30</option>
                    </select>
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit">Apply</button>
                </div>
            </form>
        </div>
    </section>

    <section class="section-card">
        <div class="section-head">
            <h4>Members List</h4>
        </div>
        <div class="section-body p-0">
            <div class="table-responsive">
                <table class="table table-bordered table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>নাম</th>
                        <th>ইমেইল</th>
                        <th>ব্যাচ</th>
                        <th>বর্তমান ভূমিকা</th>
                        <th>স্ট্যাটাস</th>
                        <th>ভেরিফাই</th>
                        <th>অ্যাকশন</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="member : ${members}">
                <td th:text="${member.fullName}"></td>
                <td th:text="${member.email}"></td>
                <td th:text="${member.batch != null ? member.batch.name : 'N/A'}"></td>
                <td>
                    <span th:if="${member.role.toString() == 'BATCH_CONTROLLER'}" class="badge bg-success">সিআর</span>
                    <span th:unless="${member.role.toString() == 'BATCH_CONTROLLER'}" class="badge bg-secondary">মেম্বার</span>
                </td>
                <td>
                    <span th:if="${member.suspended}" class="badge bg-danger">Suspended</span>
                    <span th:unless="${member.suspended}" class="badge bg-primary">Active</span>
                </td>
                <td>
                    <span th:if="${member.verified}" class="badge bg-success">Verified</span>
                    <span th:unless="${member.verified}" class="badge bg-secondary">Unverified</span>
                </td>
                <td>
                    <form th:if="${member.role.toString() == 'MEMBER'}"
                          th:action="@{/school/members/make-cr/{id}(id=${member.id})}"
                          method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-success" type="submit">CR বানান</button>
                    </form>
                    <form th:if="${member.role.toString() == 'BATCH_CONTROLLER'}"
                          th:action="@{/school/members/remove-cr/{id}(id=${member.id})}"
                          method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-danger" type="submit">CR অপসারণ</button>
                    </form>
                    <form th:if="${!member.suspended}"
                          th:action="@{/school/members/suspend/{id}(id=${member.id})}"
                          method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-warning" type="submit">Suspend</button>
                    </form>
                    <form th:if="${member.suspended}"
                          th:action="@{/school/members/unsuspend/{id}(id=${member.id})}"
                          method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-info" type="submit">Unsuspend</button>
                    </form>
                    <form th:action="@{/school/members/delete/{id}(id=${member.id})}"
                          method="post" style="display:inline"
                          onsubmit="return confirm('এই সদস্যকে ডিলিট করতে চান?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                    </form>
                </td>
                    </tr>
                    <tr th:if="${members.isEmpty()}">
                        <td colspan="7" class="text-center">কোনো সদস্য নেই।</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-2 px-3 pb-3">
                <small>মোট সদস্য: <span th:text="${totalItems}"></span></small>
                <div class="d-flex gap-2 align-items-center">
                    <a class="btn btn-sm btn-outline-secondary"
                       th:if="${page > 0}"
                       th:href="@{/school/members(q=${q},role=${role},status=${status},size=${size},page=${page-1})}">Prev</a>
                    <span>Page <span th:text="${page + 1}"></span> / <span th:text="${totalPages}"></span></span>
                    <a class="btn btn-sm btn-outline-secondary"
                       th:if="${page + 1 < totalPages}"
                       th:href="@{/school/members(q=${q},role=${role},status=${status},size=${size},page=${page+1})}">Next</a>
                </div>
            </div>
        </div>
    </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
