<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ব্যাচ গ্যালারি</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: batchNav('gallery', batch.name)}"></th:block>
    <main class="app-main">
        <div class="page-hero">
            <h2>Batch Gallery</h2>
            <p class="mt-1">ব্যাচভিত্তিক গ্যালারি আইটেম আপলোড, দেখা ও মুছে ফেলুন।</p>
        </div>
            <p class="text-success" th:if="${message}" th:text="${message}"></p>
            <div class="alert alert-warning" th:if="${crPermissions != null and !crPermissions.canUploadGallery}">
                স্কুল অ্যাডমিন এখনো গ্যালারি আপলোড/ডিলিটের অনুমতি দেননি।
            </div>

            <section class="section-card mb-3" th:if="${crPermissions != null and crPermissions.canUploadGallery}">
                <div class="section-head"><h4>Upload Item</h4></div>
                <div class="section-body">
                    <form th:action="@{/batch/gallery/upload}" method="post" enctype="multipart/form-data" class="mb-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="row g-2">
                            <div class="col-md-7">
                                <input type="file" name="imageFile" accept="image/*" class="form-control" required>
                            </div>
                            <div class="col-md-3">
                                <input type="text" name="caption" class="form-control" placeholder="ক্যাপশন (ঐচ্ছিক)">
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-primary w-100">আপলোড</button>
                            </div>
                        </div>
                    </form>
                </div>
            </section>

            <section class="section-card">
                <div class="section-head"><h4>Gallery Items</h4></div>
                <div class="section-body">
                    <div class="row g-3">
                        <div class="col-md-4" th:each="item : ${items}">
                            <div class="card h-100">
                                <img th:src="${item.url}" class="card-img-top" alt="gallery item">
                                <div class="card-body">
                                    <p class="card-text" th:text="${item.caption}"></p>
                                    <small class="text-muted d-block mb-2"
                                           th:text="${#temporals.format(item.createdAt, 'dd-MM-yyyy HH:mm')}"></small>
                                    <form th:if="${crPermissions != null and crPermissions.canUploadGallery}"
                                          th:action="@{/batch/gallery/delete/{id}(id=${item.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-danger" type="submit">মুছুন</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <div class="col-12" th:if="${items.isEmpty()}">
                            <div class="alert alert-light border">এখনো কোনো গ্যালারি আইটেম নেই।</div>
                        </div>
                    </div>
                </div>
            </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
