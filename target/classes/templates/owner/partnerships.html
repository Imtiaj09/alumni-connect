<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পার্টনারশিপ অনুমোদন</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: ownerNav('partnerships')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Partnership Review Queue</h2>
    <p class="mt-1">পেন্ডিং পার্টনারশিপ আবেদন যাচাই ও অনুমোদন করুন।</p>
</div>
<p class="text-success" th:if="${message}" th:text="${message}"></p>
<section class="section-card">
    <div class="section-head">
        <h4>Pending Partnerships</h4>
    </div>
    <div class="section-body p-0">
        <div class="table-responsive">
            <table class="table table-bordered mb-0">
                <thead>
                <tr>
                    <th>স্কুল</th>
                    <th>ডকুমেন্ট</th>
                    <th>অ্যাকশন</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="school : ${schools}">
                    <td th:text="${school.name}"></td>
                    <td>
                        <a th:if="${school.partnershipDocumentUrl != null and !school.partnershipDocumentUrl.isBlank()}"
                           th:href="${school.partnershipDocumentUrl}" target="_blank">দলিল দেখুন</a>
                        <span th:unless="${school.partnershipDocumentUrl != null and !school.partnershipDocumentUrl.isBlank()}">দলিল নেই</span>
                    </td>
                    <td>
                        <form th:action="@{/owner/partnership/approve/{id}(id=${school.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-success" type="submit">অনুমোদন</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
