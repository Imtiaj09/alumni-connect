<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সাবস্ক্রিপশন ব্যবস্থাপনা</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: ownerNav('subscriptions')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Subscription Management</h2>
    <p class="mt-1">প্রতিটি স্কুলের প্ল্যান ও মেয়াদ নিয়ন্ত্রণ করুন।</p>
</div>
<p class="text-success" th:if="${message}" th:text="${message}"></p>
<section class="section-card">
    <div class="section-head">
        <h4>School Plans</h4>
    </div>
    <div class="section-body p-0">
        <div class="table-responsive">
            <table class="table table-striped mb-0">
                <thead>
                <tr>
                    <th>স্কুল</th>
                    <th>বর্তমান প্ল্যান</th>
                    <th>মেয়াদ শেষ</th>
                    <th>পরিবর্তন</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="school : ${schools}">
                    <td th:text="${school.name}"></td>
                    <td><span class="chip chip-warn" th:text="${school.subscriptionPlan}"></span></td>
                    <td th:text="${school.subscriptionExpiry}"></td>
                    <td>
                        <form th:action="@{/owner/subscription/update/{schoolId}(schoolId=${school.id})}" method="post" class="row g-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="col-md-5">
                                <select name="plan" class="form-select form-select-sm">
                                    <option th:each="plan : ${plans}"
                                            th:value="${plan}"
                                            th:text="${plan}"
                                            th:selected="${school.subscriptionPlan == plan}"></option>
                                </select>
                            </div>
                            <div class="col-md-5">
                                <input type="date" name="expiry" class="form-control form-control-sm" th:value="${school.subscriptionExpiry}">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-sm btn-primary w-100" type="submit">আপডেট</button>
                            </div>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
 </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
