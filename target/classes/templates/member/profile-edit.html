<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোফাইল সম্পাদনা</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: memberNav('profile', 'মেম্বার')}"></th:block>
<main class="app-main">
<div class="container-fluid py-2">
    <h3>প্রোফাইল সম্পাদনা</h3>
    <p class="text-danger" th:if="${message}" th:text="${message}"></p>
    <p>প্রোফাইল সম্পন্নতা: <strong th:text="${profileCompletion + '%'}"></strong></p>
    <form th:action="@{/member/profile/edit}" method="post" enctype="multipart/form-data" th:object="${user}">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <ul class="nav nav-tabs" id="profileTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#academic" type="button">শিক্ষাগত</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#employment" type="button">পেশাগত</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#social" type="button">সোশ্যাল লিংক</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#contact" type="button">যোগাযোগ</button>
            </li>
        </ul>

        <div class="tab-content border border-top-0 p-3 mb-3">
            <div class="tab-pane fade show active" id="academic">
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">পূর্ণ নাম</label><input type="text" th:field="*{fullName}" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">গ্র্যাজুয়েশন বছর</label><input type="number" th:field="*{graduationYear}" class="form-control"></div>
                    <div class="col-md-4 mb-3"><label class="form-label">স্ট্রিম</label><input type="text" th:field="*{stream}" class="form-control"></div>
                    <div class="col-md-4 mb-3"><label class="form-label">স্পেশালাইজেশন</label><input type="text" th:field="*{specialization}" class="form-control"></div>
                    <div class="col-md-4 mb-3"><label class="form-label">ডিগ্রি</label><input type="text" th:field="*{degree}" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">বিশ্ববিদ্যালয়</label><input type="text" th:field="*{university}" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">অতিরিক্ত কার্যক্রম</label><input type="text" th:field="*{extracurricular}" class="form-control"></div>
                </div>
            </div>

            <div class="tab-pane fade" id="employment">
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">পদবী</label><input type="text" th:field="*{jobTitle}" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">প্রতিষ্ঠান</label><input type="text" th:field="*{company}" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">ইন্ডাস্ট্রি</label><input type="text" th:field="*{industry}" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">দক্ষতা</label><input type="text" th:field="*{skills}" class="form-control"></div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">ব্যবসার মালিক?</label>
                        <select th:field="*{businessOwner}" class="form-select">
                            <option th:value="false">না</option>
                            <option th:value="true">হ্যাঁ</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3"><label class="form-label">ব্যবসার নাম</label><input type="text" th:field="*{businessName}" class="form-control"></div>
                </div>
            </div>

            <div class="tab-pane fade" id="social">
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">LinkedIn</label><input type="url" th:field="*{linkedin}" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">GitHub</label><input type="url" th:field="*{github}" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Twitter</label><input type="url" th:field="*{twitter}" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Instagram</label><input type="url" th:field="*{instagram}" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Facebook</label><input type="url" th:field="*{facebook}" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">ওয়েবসাইট</label><input type="url" th:field="*{personalWebsite}" class="form-control"></div>
                </div>
            </div>

            <div class="tab-pane fade" id="contact">
                <div class="row">
                    <div class="col-md-4 mb-3"><label class="form-label">ফোন নম্বর</label><input type="text" th:field="*{phoneNumber}" class="form-control"></div>
                    <div class="col-md-4 mb-3"><label class="form-label">WhatsApp</label><input type="text" th:field="*{whatsappNumber}" class="form-control"></div>
                    <div class="col-md-4 mb-3"><label class="form-label">Telegram</label><input type="text" th:field="*{telegram}" class="form-control"></div>
                    <div class="col-md-4 mb-3"><label class="form-label">বর্তমান শহর</label><input type="text" th:field="*{currentCity}" class="form-control"></div>
                    <div class="col-md-4 mb-3"><label class="form-label">দেশ</label><input type="text" th:field="*{currentCountry}" class="form-control"></div>
                    <div class="col-md-4 mb-3"><label class="form-label">হোমটাউন</label><input type="text" th:field="*{hometown}" class="form-control"></div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">প্রোফাইল ছবি আপলোড</label>
                        <input type="file" name="profilePhotoFile" class="form-control" accept=".png,.jpg,.jpeg,.gif,.webp">
                        <small class="text-muted" th:if="${user.profilePhotoUrl}" th:text="${user.profilePhotoUrl}"></small>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">কভার ছবি আপলোড</label>
                        <input type="file" name="coverPhotoFile" class="form-control" accept=".png,.jpg,.jpeg,.gif,.webp">
                        <small class="text-muted" th:if="${user.coverPhotoUrl}" th:text="${user.coverPhotoUrl}"></small>
                    </div>
                    <div class="col-12 mb-3"><label class="form-label">বায়ো</label><textarea rows="3" th:field="*{bio}" class="form-control"></textarea></div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">সংরক্ষণ করুন</button>
    </form>
</div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
