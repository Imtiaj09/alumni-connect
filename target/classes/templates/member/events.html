<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইভেন্ট</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: memberNav('events', 'মেম্বার')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Events & Announcements</h2>
    <p class="mt-1">ব্যাচ এবং স্কুলের ইভেন্টে RSVP দিন, গুরুত্বপূর্ণ ঘোষণাগুলো দেখুন।</p>
</div>
<p class="text-success" th:if="${message}" th:text="${message}"></p>

    <section class="section-card mb-3">
        <div class="section-head"><h4>ব্যাচ ইভেন্ট</h4></div>
        <div class="section-body">
    <div th:if="${batchEvents.isEmpty()}" class="alert alert-light">ব্যাচ ইভেন্ট নেই।</div>
    <div th:each="event : ${batchEvents}" class="card mb-3">
        <div class="card-body">
            <h5 th:text="${event.title}"></h5>
            <p th:text="${event.content}"></p>
            <p class="mb-1"><strong>তারিখ:</strong> <span th:text="${event.eventDate != null ? #temporals.format(event.eventDate, 'dd MMM yyyy HH:mm') : 'TBD'}"></span></p>
            <p class="mb-2"><strong>স্থান:</strong> <span th:text="${event.eventLocation != null ? event.eventLocation : 'TBD'}"></span></p>
            <form th:action="@{/member/event/{id}/rsvp(id=${event.id})}" method="post" class="row g-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="col-md-2"><input type="number" name="guests" value="1" min="1" class="form-control"></div>
                <div class="col-md-6"><input name="note" placeholder="মন্তব্য" class="form-control"></div>
                <div class="col-md-2"><button class="btn btn-success w-100">আরএসভিপি</button></div>
            </form>
        </div>
    </div></div></section>

    <section class="section-card mb-3">
        <div class="section-head"><h4>স্কুল ইভেন্ট</h4></div>
        <div class="section-body">
    <div th:if="${schoolEvents.isEmpty()}" class="alert alert-light">স্কুল ইভেন্ট নেই।</div>
    <div th:each="event : ${schoolEvents}" class="card mb-3">
        <div class="card-body">
            <h5 th:text="${event.title}"></h5>
            <p th:text="${event.content}"></p>
            <p class="mb-1"><strong>তারিখ:</strong> <span th:text="${event.eventDate != null ? #temporals.format(event.eventDate, 'dd MMM yyyy HH:mm') : 'TBD'}"></span></p>
            <p class="mb-0"><strong>স্থান:</strong> <span th:text="${event.eventLocation != null ? event.eventLocation : 'TBD'}"></span></p>
        </div>
    </div></div></section>

    <section class="section-card">
        <div class="section-head"><h4>স্কুল ঘোষণা</h4></div>
        <div class="section-body p-0">
            <ul class="list-group">
                <li class="list-group-item" th:if="${announcements.isEmpty()}">কোনো ঘোষণা নেই।</li>
                <li class="list-group-item" th:each="a : ${announcements}">
                    <strong th:text="${a.title}"></strong>
                    <p class="mb-0" th:text="${a.content}"></p>
                </li>
            </ul>
        </div>
    </section>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
