<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অনুদান দিন</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: memberNav('funds', 'মেম্বার')}"></th:block>
<main class="app-main">
<div class="container-fluid py-2">
    <h2 th:text="${campaign.title}"></h2>
    <p th:text="${campaign.description}"></p>
    <p>
        <strong>লক্ষ্য:</strong> <span th:text="${campaign.targetAmount}"></span> |
        <strong>সংগৃহীত:</strong> <span th:text="${campaign.collectedAmount}"></span>
    </p>

    <form th:action="@{/member/fund-campaign/{id}/donate(id=${campaign.id})}" method="post" th:object="${donation}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label class="form-label">অনুদানের পরিমাণ</label>
            <input type="number" min="1" step="0.01" class="form-control" th:field="*{amount}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">ট্রানজ্যাকশন রেফারেন্স (ঐচ্ছিক)</label>
            <input type="text" class="form-control" th:field="*{transactionRef}">
        </div>
        <button type="submit" class="btn btn-primary">অনুদান নিশ্চিত করুন</button>
    </form>
</div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
