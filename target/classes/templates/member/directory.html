<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য ডিরেক্টরি</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: memberNav('directory', (batch != null ? batch.name : 'মেম্বার'))}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Member Directory</h2>
    <p class="mt-1">আপনার ব্যাচের সদস্যদের প্রোফাইল, যোগাযোগ ও ভূমিকা দেখুন।</p>
</div>
<section class="section-card">
    <div class="section-head"><h4>Batch Members</h4></div>
    <div class="section-body">
        <div class="row">
            <div class="col-md-4 mb-3" th:each="member : ${members}">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${member.fullName}"></h5>
                        <p class="card-text mb-0">
                            <small>ইমেইল: <span th:text="${member.email}"></span></small>
                        </p>
                        <p class="card-text">
                            <small>পদবি: <span th:text="${member.role}"></span></small>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
