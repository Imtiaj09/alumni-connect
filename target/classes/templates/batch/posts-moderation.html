<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পোস্ট মডারেশন</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: batchNav('posts', batch.name)}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Posts Moderation</h2>
    <p class="mt-1">ব্যাচের পেন্ডিং পোস্টগুলো যাচাই করে অনুমোদন বা প্রত্যাখ্যান দিন।</p>
</div>
    <p class="text-success" th:if="${message}" th:text="${message}"></p>
    <div class="alert alert-warning" th:if="${crPermissions != null and !crPermissions.canApprovePosts}">
        স্কুল অ্যাডমিন এখনো আপনার জন্য পোস্ট মডারেশনের অনুমতি চালু করেননি।
    </div>
    <section class="section-card">
        <div class="section-head"><h4>Pending Posts</h4></div>
        <div class="section-body">
            <div th:if="${pendingPosts.isEmpty()}">কোনো পেন্ডিং পোস্ট নেই।</div>
            <div th:each="post : ${pendingPosts}" class="card mb-3">
                <div class="card-body">
                    <h5 th:text="${post.title}"></h5>
                    <p th:text="${post.content}"></p>
                    <small>লেখক: <span th:text="${post.createdBy != null ? post.createdBy.fullName : 'N/A'}"></span></small>
                    <div class="mt-2 d-flex gap-2" th:if="${crPermissions != null and crPermissions.canApprovePosts}">
                        <form th:action="@{/batch/posts/approve/{id}(id=${post.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-success" type="submit">অনুমোদন</button>
                        </form>
                        <form th:action="@{/batch/posts/reject/{id}(id=${post.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-danger" type="submit">প্রত্যাখ্যান</button>
                        </form>
                    </div>
                    <small class="text-muted d-block mt-2"
                           th:if="${crPermissions != null and !crPermissions.canApprovePosts}">
                        এই পোস্টে অ্যাকশন নেওয়ার অনুমতি নেই।
                    </small>
                </div>
            </div>
        </div>
    </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
