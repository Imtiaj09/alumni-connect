<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নোটিশ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: batchNav('notices', batch.name)}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Batch Notices</h2>
    <p class="mt-1">ব্যাচের অফিসিয়াল নোটিশ তৈরি, পিন এবং প্রকাশ করুন।</p>
</div>
    <p class="text-success" th:if="${message}" th:text="${message}"></p>
    <div class="alert alert-warning" th:if="${crPermissions != null and !crPermissions.canCreateNotices}">
        স্কুল অ্যাডমিন এখনো আপনার জন্য নোটিশ তৈরির অনুমতি চালু করেননি।
    </div>
    <section class="section-card mb-3" th:if="${crPermissions != null and crPermissions.canCreateNotices}">
        <div class="section-head"><h4>Create Notice</h4></div>
        <div class="section-body">
            <form th:action="@{/batch/notices/create}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <input name="title" class="form-control" placeholder="শিরোনাম" required>
                </div>
                <div class="mb-3">
                    <textarea name="content" class="form-control" rows="3" placeholder="বিস্তারিত" required></textarea>
                </div>
                <div class="form-check mb-3">
                    <input type="checkbox" name="pinned" class="form-check-input" id="pinned">
                    <label class="form-check-label" for="pinned">পিন করা</label>
                </div>
                <button type="submit" class="btn btn-primary">প্রকাশ করুন</button>
            </form>
        </div>
    </section>
    <section class="section-card">
        <div class="section-head"><h4>Published Notices</h4></div>
        <div class="section-body">
            <div th:each="notice : ${notices}" class="card mb-2">
                <div class="card-body">
                    <h5 class="card-title" th:text="${notice.title}"></h5>
                    <p class="card-text" th:text="${notice.content}"></p>
                    <small>তারিখ: <span th:text="${#temporals.format(notice.createdAt, 'dd-MM-yyyy HH:mm')}"></span></small>
                    <form th:if="${crPermissions != null and crPermissions.canCreateNotices}"
                          th:action="@{/batch/notices/delete/{id}(id=${notice.id})}" method="post" class="d-inline float-end">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-danger" type="submit">মুছুন</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
