<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য তালিকা</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('members')}"></th:block>
<main class="app-main">
<div class="container-fluid py-2">
    <h2 class="mb-3">ব্যাচ কন্ট্রোলার</h2>
    <p class="text-success" th:if="${message}" th:text="${message}"></p>
    <div class="table-responsive">
        <table class="table table-bordered">
            <thead><tr><th>নাম</th><th>ইমেইল</th><th>অ্যাকশন</th></tr></thead>
            <tbody>
            <tr th:if="${controllers.isEmpty()}"><td colspan="3">কোনো CR নেই।</td></tr>
            <tr th:each="c : ${controllers}">
                <td th:text="${c.fullName}"></td>
                <td th:text="${c.email}"></td>
                <td>
                    <form th:action="@{/school/members/remove-cr/{id}(id=${c.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-danger">CR অপনয়ন</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <h2 class="mt-4 mb-3">সাধারণ সদস্য</h2>
    <div class="table-responsive">
        <table class="table table-striped">
            <thead><tr><th>নাম</th><th>ইমেইল</th><th>ভেরিফায়েড</th></tr></thead>
            <tbody>
            <tr th:if="${members.isEmpty()}"><td colspan="3">কোনো সদস্য নেই।</td></tr>
            <tr th:each="m : ${members}">
                <td th:text="${m.fullName}"></td>
                <td th:text="${m.email}"></td>
                <td th:text="${m.verified ? 'হ্যাঁ' : 'না'}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
