<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কন্টেন্ট মডারেশন</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('moderation')}"></th:block>
<main class="app-main">
<div class="container-fluid py-2">
    <h2>অনুমোদনের অপেক্ষায় পোস্ট</h2>
    <p class="text-success" th:if="${message}" th:text="${message}"></p>
    <div th:if="${pendingPosts.isEmpty()}">
        <p>কোনো পেন্ডিং পোস্ট নেই।</p>
    </div>
    <div th:each="post : ${pendingPosts}" class="card mb-3">
        <div class="card-body">
            <h5 th:text="${post.title}"></h5>
            <p th:text="${post.content}"></p>
            <small>
                লেখক:
                <span th:text="${post.createdBy != null ? post.createdBy.fullName : 'N/A'}"></span>
                |
                ব্যাচ:
                <span th:text="${post.batch != null ? post.batch.name : 'স্কুল-ব্যাপী'}"></span>
            </small>
            <div class="mt-2 d-flex gap-2">
                <form th:action="@{/school/content/approve/{id}(id=${post.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-sm btn-success" type="submit">অনুমোদন</button>
                </form>
                <form th:action="@{/school/content/reject/{id}(id=${post.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-sm btn-danger" type="submit">প্রত্যাখ্যান</button>
                </form>
            </div>
        </div>
    </div>
</div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
