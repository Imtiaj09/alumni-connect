<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ব্যাচ ব্যবস্থাপনা</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('batches')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Batches Management</h2>
    <p class="mt-1">নতুন ব্যাচ তৈরি করুন এবং বিদ্যমান ব্যাচগুলোর তথ্য পরিচালনা করুন।</p>
</div>
    <p class="text-success" th:if="${message}" th:text="${message}"></p>
    <section class="section-card mb-3">
        <div class="section-head"><h4>Create Batch</h4></div>
        <div class="section-body">
            <form th:action="@{/school/batches/create}" method="post" class="row g-2 mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="col-md-3">
                    <input type="text" name="name" class="form-control" placeholder="ব্যাচের নাম (যেমন: SSC 2015)" required>
                </div>
                <div class="col-md-2">
                    <input type="number" name="batchYear" class="form-control" placeholder="বছর" required>
                </div>
                <div class="col-md-5">
                    <input type="text" name="description" class="form-control" placeholder="বিবরণ (ঐচ্ছিক)">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" type="submit">তৈরি করুন</button>
                </div>
            </form>
        </div>
    </section>
    <section class="section-card">
        <div class="section-head"><h4>Batch List</h4></div>
        <div class="section-body p-0">
            <div class="table-responsive">
                <table class="table table-bordered mb-0">
                    <thead>
                    <tr>
                        <th>নাম</th>
                        <th>বছর</th>
                        <th>বিবরণ</th>
                        <th>অ্যাকশন</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="batch : ${batches}">
                        <td th:text="${batch.name}"></td>
                        <td th:text="${batch.batchYear}"></td>
                        <td th:text="${batch.description}"></td>
                        <td>
                            <form th:action="@{/school/batches/delete/{id}(id=${batch.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-danger" type="submit">মুছুন</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
