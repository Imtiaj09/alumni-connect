<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অনুমোদনের অপেক্ষায় সদস্য</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('pending-members')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Pending Member Approvals</h2>
    <p class="mt-1">নতুন সদস্য আবেদন যাচাই, অনুমোদন বা বাতিল করুন।</p>
</div>
    <p class="text-success" th:if="${message}" th:text="${message}"></p>
    <section class="section-card">
        <div class="section-head">
            <h4>Approval Queue</h4>
        </div>
        <div class="section-body p-0">
            <div class="table-responsive">
                <table class="table mb-0">
                    <thead>
                    <tr>
                        <th>নাম</th>
                        <th>ইমেইল</th>
                        <th>ব্যাচ</th>
                        <th>অ্যাকশন</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="member : ${pendingMembers}">
                <td th:text="${member.fullName}"></td>
                <td th:text="${member.email}"></td>
                <td th:text="${member.batch != null ? member.batch.name : 'N/A'}"></td>
                <td class="d-flex gap-2 flex-wrap">
                    <form th:action="@{/school/members/approve/{id}(id=${member.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-success" type="submit">অনুমোদন</button>
                    </form>
                    <form th:action="@{/school/members/reject/{id}(id=${member.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-danger" type="submit">বাতিল</button>
                    </form>
                    <form th:action="@{/school/members/verify/{id}(id=${member.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-secondary" type="submit">ভেরিফাই</button>
                    </form>
                    <form th:action="@{/school/members/assign-cr}" method="post" class="d-flex gap-2">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="memberId" th:value="${member.id}">
                        <select name="batchId" class="form-select form-select-sm" required>
                            <option value="">ব্যাচ নির্বাচন</option>
                            <option th:each="b : ${batches}"
                                    th:value="${b.id}"
                                    th:text="${b.name}"></option>
                        </select>
                        <button class="btn btn-sm btn-info text-white" type="submit">CR বানান</button>
                    </form>
                </td>
            </tr>
                    <tr th:if="${pendingMembers.isEmpty()}">
                        <td colspan="4" class="text-center">কোনো অপেক্ষমাণ সদস্য নেই।</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
