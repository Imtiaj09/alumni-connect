<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>দান তালিকা</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('funds')}"></th:block>
<main class="app-main">
<div class="container-fluid py-2">
    <h2 th:text="${campaign.title} + ' - দান তালিকা'"></h2>
    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>দাতা</th>
                <th>পরিমাণ</th>
                <th>রেফারেন্স</th>
                <th>সময়</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="donation : ${donations}">
                <td th:text="${donation.donor != null ? donation.donor.fullName : 'N/A'}"></td>
                <td th:text="${donation.amount}"></td>
                <td th:text="${donation.transactionRef}"></td>
                <td th:text="${#temporals.format(donation.donatedAt, 'dd-MM-yyyy HH:mm')}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
