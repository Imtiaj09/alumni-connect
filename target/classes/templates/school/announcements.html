<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্কুল ঘোষণা</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('announcements')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Announcements</h2>
    <p class="mt-1">স্কুল-ওয়াইড এবং ব্যাচ-নির্দিষ্ট অফিসিয়াল ঘোষণা প্রকাশ করুন।</p>
</div>
    <p class="text-success" th:if="${message}" th:text="${message}"></p>
    <section class="section-card mb-3">
        <div class="section-head"><h4>Create Announcement</h4></div>
        <div class="section-body">
            <form th:action="@{/school/announcements/create}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3"><label class="form-label">শিরোনাম</label><input class="form-control" name="title" required></div>
                <div class="mb-3"><label class="form-label">বিস্তারিত</label><textarea class="form-control" rows="3" name="content" required></textarea></div>
                <div class="mb-3">
                    <label class="form-label">ব্যাচ (ঐচ্ছিক)</label>
                    <select class="form-select" name="batchId">
                        <option value="">স্কুল-ওয়াইড ঘোষণা</option>
                        <option th:each="b : ${batches}" th:value="${b.id}" th:text="${b.name}"></option>
                    </select>
                </div>
                <button class="btn btn-primary">ঘোষণা দিন</button>
            </form>
        </div>
    </section>

    <section class="section-card">
        <div class="section-head"><h4>Recent Announcements</h4></div>
        <div class="section-body p-0">
            <ul class="list-group list-group-flush">
                <li class="list-group-item" th:if="${announcements.isEmpty()}">কোনো ঘোষণা নেই।</li>
                <li class="list-group-item" th:each="a : ${announcements}">
                    <strong th:text="${a.title}"></strong>
                    <p class="mb-1" th:text="${a.content}"></p>
                    <small th:text="${#temporals.format(a.createdAt, 'dd-MM-yyyy HH:mm')}"></small>
                </li>
            </ul>
        </div>
    </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
