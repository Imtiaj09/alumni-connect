<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>তহবিল প্রচারাভিযান</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('funds')}"></th:block>
<main class="app-main">
<div class="page-hero">
    <h2>Fund Campaigns</h2>
    <p class="mt-1">চলমান এবং সম্পন্ন ক্যাম্পেইন ট্র্যাক করুন, দ্রুত নতুন ক্যাম্পেইন তৈরি করুন।</p>
</div>
    <p class="text-success" th:if="${message}" th:text="${message}"></p>
    <section class="section-card">
        <div class="section-head">
            <h4>Campaign List</h4>
            <a class="btn btn-success" th:href="@{/school/fund-campaign/create}">নতুন ক্যাম্পেইন</a>
        </div>
        <div class="section-body p-0">
            <div class="table-responsive">
                <table class="table table-bordered mb-0">
                    <thead>
                    <tr>
                        <th>শিরোনাম</th>
                        <th>লক্ষ্য</th>
                        <th>সংগৃহীত</th>
                        <th>শেষ তারিখ</th>
                        <th>অ্যাকশন</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="campaign : ${campaigns}">
                        <td th:text="${campaign.title}"></td>
                        <td th:text="${campaign.targetAmount}"></td>
                        <td th:text="${campaign.collectedAmount}"></td>
                        <td th:text="${campaign.deadline}"></td>
                        <td class="d-flex gap-2">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/school/fund-campaign/{id}/donations(id=${campaign.id})}">দান তালিকা</a>
                            <form th:action="@{/school/fund-campaign/{id}/close(id=${campaign.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-danger" type="submit">বন্ধ করুন</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
