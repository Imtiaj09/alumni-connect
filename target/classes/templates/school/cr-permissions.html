<!DOCTYPE html>
<html lang="bn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR পারমিশন</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block th:replace="~{fragments/role-nav :: schoolNav('cr-permissions')}"></th:block>
    <main class="app-main">
        <div class="container-fluid py-2">
            <h2 class="mb-3">CR পারমিশন কন্ট্রোল</h2>
            <p class="text-success" th:if="${message}" th:text="${message}"></p>

            <section class="section-card mb-3">
                <div class="section-head">
                    <h4>ডিফল্ট পারমিশন (সব CR-এর বেসলাইন)</h4>
                </div>
                <div class="section-body">
                    <form th:action="@{/school/cr-permissions}" method="post" th:object="${permissions}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" th:field="*{schoolId}">
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" th:field="*{canApprovePosts}">
                            <label class="form-check-label">পোস্ট অনুমোদন</label>
                        </div>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" th:field="*{canCreateNotices}">
                            <label class="form-check-label">নোটিশ তৈরি</label>
                        </div>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" th:field="*{canUploadGallery}">
                            <label class="form-check-label">গ্যালারি আপলোড</label>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" th:field="*{canModerateMembers}">
                            <label class="form-check-label">সদস্য মডারেশন</label>
                        </div>
                        <button class="btn btn-primary" type="submit">ডিফল্ট সংরক্ষণ</button>
                    </form>
                </div>
            </section>

            <section class="section-card">
                <div class="section-head">
                    <h4>ব্যক্তিগত পারমিশন (নাম ধরে পাওয়ার দিন)</h4>
                </div>
                <div class="section-body">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>সদস্য</th>
                                <th>রোল</th>
                                <th>Approve Posts</th>
                                <th>Create Notices</th>
                                <th>Upload Gallery</th>
                                <th>Moderate Members</th>
                                <th>অ্যাকশন</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${permissionTargets.isEmpty()}">
                                <td colspan="7" class="text-center">কোনো সদস্য পাওয়া যায়নি।</td>
                            </tr>
                            <tr th:each="member : ${permissionTargets}">
                                <td>
                                    <div><strong th:text="${member.fullName}"></strong></div>
                                    <small th:text="${member.email}"></small>
                                </td>
                                <td>
                                    <span class="badge text-bg-success" th:if="${member.role.toString() == 'BATCH_CONTROLLER'}">CR</span>
                                    <span class="badge text-bg-secondary" th:unless="${member.role.toString() == 'BATCH_CONTROLLER'}">MEMBER</span>
                                </td>
                                <td colspan="5">
                                    <form class="d-flex flex-wrap align-items-center gap-3"
                                          th:action="@{/school/cr-permissions/user/{userId}(userId=${member.id})}"
                                          method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                                        <div class="form-check form-switch m-0">
                                            <input class="form-check-input" type="checkbox" name="canApprovePosts"
                                                   th:checked="${customPermissionMap[member.id] != null ? customPermissionMap[member.id].canApprovePosts : permissions.canApprovePosts}">
                                        </div>
                                        <div class="form-check form-switch m-0">
                                            <input class="form-check-input" type="checkbox" name="canCreateNotices"
                                                   th:checked="${customPermissionMap[member.id] != null ? customPermissionMap[member.id].canCreateNotices : permissions.canCreateNotices}">
                                        </div>
                                        <div class="form-check form-switch m-0">
                                            <input class="form-check-input" type="checkbox" name="canUploadGallery"
                                                   th:checked="${customPermissionMap[member.id] != null ? customPermissionMap[member.id].canUploadGallery : permissions.canUploadGallery}">
                                        </div>
                                        <div class="form-check form-switch m-0">
                                            <input class="form-check-input" type="checkbox" name="canModerateMembers"
                                                   th:checked="${customPermissionMap[member.id] != null ? customPermissionMap[member.id].canModerateMembers : permissions.canModerateMembers}">
                                        </div>

                                        <button class="btn btn-sm btn-primary" type="submit">Save</button>
                                    </form>
                                    <form th:action="@{/school/cr-permissions/user/{userId}/reset(userId=${member.id})}"
                                          method="post"
                                          class="mt-2">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-secondary" type="submit">Reset to Default</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
